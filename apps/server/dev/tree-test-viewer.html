<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>tree-test-viewer (dev, Evolution-TZ Э5)</title>
<style>
  body { font: 13px/1.4 monospace; background: #111; color: #ddd; padding: 16px; max-width: 720px; }
  h1 { font-size: 15px; color: #fff; }
  p.note { color: #999; }
  label { display: block; margin-top: 10px; }
  input { width: 100%; box-sizing: border-box; padding: 6px; background: #222; color: #fff; border: 1px solid #444; }
  button { margin-top: 12px; padding: 8px 14px; cursor: pointer; }
  video { width: 480px; margin-top: 12px; background: #000; display: block; }
  #log { margin-top: 12px; white-space: pre-wrap; background: #000; padding: 8px; height: 220px; overflow-y: auto; border: 1px solid #333; }
  #stats { margin-top: 12px; background: #000; padding: 8px; border: 1px solid #333; color: #6f6; }
  .err { color: #f66; }
</style>
</head>
<body>
<h1>tree-test-viewer — dev-only, Evolution-TZ Э5</h1>
<p class="note">
  Не часть продукта. Проверяет приём H.264 от нативного (Rust) вещателя дерева —
  минимальная переpеализация <code>treeVideo.ts</code> (browser = лист, отвечает на offer).
</p>
<label>Session JWT (то же, что взял нативный смоук-тест)
  <input id="token" placeholder="eyJ...">
</label>
<label>streamId (совпадает с identity, который передал нативный вещатель)
  <input id="streamId" placeholder="native-smoketest">
</label>
<button id="startBtn">▶ Смотреть</button>
<button id="stopBtn" disabled>◼ Остановить</button>
<video id="remote" autoplay playsinline></video>
<div id="stats">нет статистики — жди подключения</div>
<div id="log"></div>

<script>
const $ = (id) => document.getElementById(id);
const logEl = $('log');
function log(msg, isErr) {
  const line = document.createElement('div');
  if (isErr) line.className = 'err';
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

let ws = null;
let pc = null;
let parentId = null;
let statsTimer = null;
let lastBytes = { video: 0, audio: 0 };
let lastStatsAt = 0;

function startStatsLoop() {
  lastBytes = { video: 0, audio: 0 };
  lastStatsAt = performance.now();
  statsTimer = setInterval(async () => {
    if (!pc) return;
    const report = await pc.getStats();
    const now = performance.now();
    const dt = (now - lastStatsAt) / 1000;
    let lines = [];
    report.forEach((r) => {
      if (r.type === 'inbound-rtp' && (r.kind === 'video' || r.kind === 'audio')) {
        const kbps = dt > 0 ? Math.round(((r.bytesReceived - lastBytes[r.kind]) * 8 / 1000) / dt) : 0;
        lastBytes[r.kind] = r.bytesReceived;
        if (r.kind === 'video') {
          lines.push(`video: ${r.frameWidth || '?'}x${r.frameHeight || '?'} @ ${r.framesPerSecond != null ? r.framesPerSecond.toFixed(1) : '?'}fps, ${kbps}kbps, decoded=${r.framesDecoded}, dropped=${r.framesDropped || 0}, jitter=${(r.jitter*1000).toFixed(0)}ms`);
        } else {
          lines.push(`audio: ${kbps}kbps, packetsReceived=${r.packetsReceived}, jitter=${(r.jitter*1000).toFixed(0)}ms, concealed=${r.concealedSamples || 0}`);
        }
      }
      if (r.type === 'candidate-pair' && r.state === 'succeeded' && r.nominated) {
        lines.push(`rtt=${r.currentRoundTripTime != null ? Math.round(r.currentRoundTripTime * 1000) + 'ms' : '?'}`);
      }
    });
    lastStatsAt = now;
    $('stats').textContent = lines.length ? lines.join('\n') : 'нет inbound-rtp пока';
  }, 1000);
}

function stopStatsLoop() {
  if (statsTimer) { clearInterval(statsTimer); statsTimer = null; }
  $('stats').textContent = 'нет статистики — жди подключения';
}

function preferH264(pc) {
  const caps = RTCRtpReceiver.getCapabilities && RTCRtpReceiver.getCapabilities('video');
  const h264 = (caps && caps.codecs || []).filter((c) => c.mimeType.toLowerCase() === 'video/h264');
  if (!h264.length) { log('нет getCapabilities — уйдёт как договорились в offer', true); return; }
  pc.getTransceivers().forEach((t) => {
    if (t.receiver && t.receiver.track && t.receiver.track.kind === 'video') {
      try { t.setCodecPreferences(h264); } catch (e) { log('setCodecPreferences: ' + e, true); }
    }
  });
}

async function onOffer(streamId, sdp) {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  pc.onicecandidate = (e) => { if (e.candidate) ws.send(JSON.stringify({ t: 'ice', streamId, to: parentId, candidate: e.candidate })); };
  pc.onconnectionstatechange = () => log('pc: ' + pc.connectionState);
  pc.ontrack = (e) => {
    log('ontrack: ' + e.track.kind);
    // video и audio-трек делят один stream_id (peer.rs) — это один и тот же
    // MediaStream в обоих вызовах, просто всегда переприсваиваем srcObject.
    $('remote').srcObject = e.streams[0] || new MediaStream([e.track]);
  };
  await pc.setRemoteDescription({ type: 'offer', sdp });
  preferH264(pc);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ t: 'sdp', streamId, to: parentId, type: 'answer', sdp: pc.localDescription.sdp }));
  log('answered offer from ' + parentId);
  startStatsLoop();
}

function start() {
  const token = $('token').value.trim();
  const streamId = $('streamId').value.trim();
  if (!token || !streamId) { log('нужен token и streamId', true); return; }

  const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
  ws = new WebSocket(proto + location.host + '/tree?token=' + encodeURIComponent(token));

  ws.onopen = () => {
    ws.send(JSON.stringify({ t: 'join', streamId, role: 'viewer', native: false, identity: 'test-viewer' }));
    log('joined as viewer, streamId=' + streamId);
  };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.t === 'welcome') log('welcome, id=' + msg.id);
    else if (msg.t === 'assign-parent') { parentId = msg.parentId; log('assign-parent: ' + parentId); }
    else if (msg.t === 'sdp' && msg.type === 'offer' && msg.from === parentId) onOffer(streamId, msg.sdp);
    else if (msg.t === 'ice' && msg.from === parentId && pc) pc.addIceCandidate(msg.candidate).catch((e) => log('addIceCandidate: ' + e, true));
    else if (msg.t === 'drop-peer') log('drop-peer: ' + msg.peerId, true);
    else if (msg.t === 'tree-info') log('tree-info: depth=' + msg.depth);
  };
  ws.onclose = () => log('ws closed');
  ws.onerror = (e) => log('ws error ' + e, true);

  $('startBtn').disabled = true;
  $('stopBtn').disabled = false;
}

function stop() {
  if (ws) { try { ws.send(JSON.stringify({ t: 'leave' })); } catch {} try { ws.close(); } catch {} ws = null; }
  if (pc) { pc.close(); pc = null; }
  $('remote').srcObject = null;
  stopStatsLoop();
  $('startBtn').disabled = false;
  $('stopBtn').disabled = true;
  log('stopped');
}

$('startBtn').onclick = start;
$('stopBtn').onclick = stop;
</script>
</body>
</html>
