<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Рилэй</title>
  <meta name="theme-color" content="#0b0c0f" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon-256.png" type="image/png" sizes="256x256" />
  <link rel="icon" href="/icon-128.png" type="image/png" sizes="128x128" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <style>
    html,body{margin:0;height:100%;background:#0b0c0f}
    #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0c0f;z-index:9999}
    #boot .b{display:flex;flex-direction:column;align-items:center;gap:18px}
    #boot .b img{width:88px;height:88px;border-radius:20px;box-shadow:0 12px 32px -8px rgba(139,92,246,.55)}
    #boot .s{width:22px;height:22px;border:3px solid rgba(255,255,255,.25);border-top-color:#a78bfa;border-radius:50%;animation:bootspin .7s linear infinite}
    @keyframes bootspin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root">
    <div id="boot"><div class="b"><img src="/icon-256.png" alt="Рилэй" /><div class="s"></div></div></div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
