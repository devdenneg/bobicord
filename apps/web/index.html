<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Voice</title>
  <meta name="theme-color" content="#0b0c0f" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <style>
    html,body{margin:0;height:100%;background:#0b0c0f}
    #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0c0f;z-index:9999}
    #boot .b{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px -6px rgba(99,102,241,.6)}
    #boot .s{width:22px;height:22px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:bootspin .7s linear infinite}
    @keyframes bootspin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root">
    <div id="boot"><div class="b"><div class="s"></div></div></div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
