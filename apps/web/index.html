<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Bobicord</title>
  <meta name="theme-color" content="#0b0c0f" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <style>
    html,body{margin:0;height:100%;background:#0b0c0f}
    #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0c0f;z-index:9999}
    #boot img{width:104px;height:104px;animation:bootpulse 1.3s ease-in-out infinite;filter:drop-shadow(0 10px 34px rgba(99,102,241,.55))}
    @keyframes bootpulse{0%,100%{transform:scale(.9);opacity:.72}50%{transform:scale(1.06);opacity:1}}
  </style>
</head>
<body>
  <div id="root">
    <div id="boot"><img src="/icon.png" alt="Bobicord" /></div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
