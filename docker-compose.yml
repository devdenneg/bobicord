services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    network_mode: host
    restart: unless-stopped
    volumes:
      # своя копия livekit.example.yaml с реальными ключами (в .gitignore)
      - ./livekit.yaml:/etc/livekit.yaml:ro

  token:
    image: ghcr.io/devdenneg/bobicord-server:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      - LK_KEY=${LK_KEY}
      - LK_SECRET=${LK_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - LK_WS_URL=${LK_WS_URL}
      - TURN_SECRET=${TURN_SECRET}
      - TURN_URLS=${TURN_URLS}
      - TURN_TTL_SEC=${TURN_TTL_SEC:-600}
      # Roadmap-flow-стриминга Д8: server-first (стример → сервер → зрители) — ДЕФОЛТ on.
      # Дефолт в коде (tree.js: TREE_SERVER_FIRST !== '0'); откат на legacy = выставить 0.
      # Действует только для стримов с serverIngest (нативный клиент); старые бандлы — legacy.
      - TREE_SERVER_FIRST=${TREE_SERVER_FIRST:-1}
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:3000:3000"

  # STUN/TURN для P2P relay-дерева (Evolution-TZ Э3). host-сеть — coturn сам слушает
  # 3478 (STUN/TURN) + min-port..max-port (relay). Секрет — только через env (CLAUDE.md).
  coturn:
    image: coturn/coturn:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
    environment:
      - TURN_SECRET=${TURN_SECRET}
      - TURN_REALM=${TURN_REALM:-relayapp.local}
      # Д8: --external-ip. Нужен ТОЛЬКО если coturn за NAT (приватный адрес на интерфейсе).
      # При host-сети и публичном IPv4 прямо на интерфейсе — оставить пустым. Пусто = флаг
      # НЕ добавляется (coturn падает на пустом значении).
      - TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}
      # Привязка к публичному интерфейсу: без неё coturn слушает и docker-мосты (172.x),
      # раздавая недостижимые relay-кандидаты. Пусто = слушать всё (прежнее поведение).
      - TURN_LISTEN_IP=${TURN_LISTEN_IP:-}
    # ${VAR:+...} подставляет флаг ТОЛЬКО если переменная непуста (иначе строки нет вовсе).
    command: ["sh", "-c", "turnserver -c /etc/turnserver.conf --static-auth-secret=$${TURN_SECRET} --realm=$${TURN_REALM} $${TURN_EXTERNAL_IP:+--external-ip=$${TURN_EXTERNAL_IP}} $${TURN_LISTEN_IP:+--listening-ip=$${TURN_LISTEN_IP} --relay-ip=$${TURN_LISTEN_IP}}"]

  # Э9: виртуальный fallback-relay — джойнится в relay-дерево, когда у зрителей нет живых
  # relay-пиров (или зритель явно выбрал «через сервер»), и passthrough-ретранслирует RTP.
  # host-сеть: WebRTC UDP напрямую с публичного IP (TURN/srflx не нужны); сигналинг — на
  # локальный token-сервис, TLS не нужен.
  vrelay:
    image: ghcr.io/devdenneg/bobicord-vrelay:latest
    pull_policy: always
    network_mode: host
    restart: unless-stopped
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - TREE_WS_URL=ws://127.0.0.1:3000/tree
      # Д1: server-first делает vrelay постоянным медиаузлом. Фолбэк по ЗАМЕРУ прода
      # (138.16.170.21, 2026-07-09): upload ~37 Мбит/с (6 параллельных потоков; одиночный
      # поток врёт 15 Мбит — окно×RTT). (37×0.7)/6 Мбит ≈ 4.
      # egress ≈ битрейт × дети; при server-first через виртуала идёт ВЕСЬ видеотрафик.
      # Переоценка = потери у всех зрителей; недооценка безопасна (дерево ветвится, Д6).
      - VRELAY_MAX_CHILDREN=${VRELAY_MAX_CHILDREN:-4}
      # Исходящая полоса узла (Мбит/с) для скоринга best-peer — НЕ ограничитель, а вес.
      # Замеренная, не тарифная: завышение = сервер считает себя жирным и перетягивает зрителей.
      - VRELAY_OUT_MBPS=${VRELAY_OUT_MBPS:-37}
      # Д2/Д4: сколько ffmpeg-транскодов одновременно. 0 = рендишны ОТКЛЮЧЕНЫ (source-only
      # passthrough); зритель получает 'rendition-unavailable', меню качества пусто.
      # Прод — 1 vCPU @2.25GHz, делит ядро с livekit/coturn/token/caddy. Транскод (декод
      # 1080p + x264-энкод) съест ядро целиком и задушит ГОЛОС. Поднимать только на VPS
      # с выделенными ядрами: ~1 ядро на один 720p30-рендишн.
      - VRELAY_MAX_TRANSCODES=${VRELAY_MAX_TRANSCODES:-0}
      - RUST_LOG=info

  caddy:
    # запечены статика фронта + Caddyfile
    image: ghcr.io/devdenneg/bobicord-web:latest
    pull_policy: always
    network_mode: host
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
