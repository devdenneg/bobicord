# Ротация логов Docker. Без неё драйвер json-file пишет БЕЗ ОГРАНИЧЕНИЙ: контейнеры с
# restart:unless-stopped живут месяцами, а диагностика стрима (строки `[health]` дерева и
# `ingest ...` у vrelay) объём только добавила. Переполнение диска на VPS убило бы и БД, и
# загрузки, и сам деплой.
#
# Бюджет ~1.5 ГБ на все сервисы (max-size × max-file), плюс каталог data/diag с
# собственным капом 100 МБ (см. pruneDiag в apps/server/index.js) — суммарно под 2 ГБ.
# max-file:2 = один активный файл + один повёрнутый, то есть история не меньше max-size.
x-logging: &logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "2"

services:
  livekit:
    image: livekit/livekit-server:v1.13.1@sha256:2c6869d2d5ff6c9c0166f47be1c92dad6928bfecfa5e4060a6ece48db8accfa3
    command: --config /etc/livekit.yaml
    network_mode: host
    restart: unless-stopped
    logging: *logging
    volumes:
      # своя копия livekit.example.yaml с реальными ключами (в .gitignore)
      - ./livekit.yaml:/etc/livekit.yaml:ro

  token:
    image: ghcr.io/devdenneg/bobicord-server:${IMAGE_TAG:?IMAGE_TAG_is_required}
    pull_policy: always
    restart: unless-stopped
    logging: *logging
    environment:
      - NODE_ENV=production
      - LK_KEY=${LK_KEY}
      - LK_SECRET=${LK_SECRET}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET_is_required}
      # Отдельный service-JWT secret медиарелея. Никогда не совпадает с SESSION_SECRET:
      # удалённый media VPS не должен уметь выпускать пользовательские/admin-сессии.
      - VRELAY_AUTH_SECRET=${VRELAY_AUTH_SECRET:?VRELAY_AUTH_SECRET_is_required}
      # Только для первого двухфазного rollout старого media VPS; после его обновления вернуть 0.
      - VRELAY_ACCEPT_LEGACY_SESSION_TOKEN=${VRELAY_ACCEPT_LEGACY_SESSION_TOKEN:-0}
      - LK_WS_URL=${LK_WS_URL}
      # Email auth is rolled out in three stages: disabled for delivery testing, optional for the
      # migration UI, required for server-side enforcement. Credentials never live
      # in this environment block: the app reads them from the read-only Compose secrets below.
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-https://reelay.online}
      - AUTH_EMAIL_ENFORCEMENT=${AUTH_EMAIL_ENFORCEMENT:-disabled}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-RelayApp}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-0}
      - SMTP_REQUIRE_TLS=${SMTP_REQUIRE_TLS:-1}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD_FILE=/run/secrets/smtp_password
      - AUTH_CODE_PEPPER_FILE=/run/secrets/auth_code_pepper
      - EMAIL_CODE_TTL_SEC=${EMAIL_CODE_TTL_SEC:-600}
      - EMAIL_CODE_MAX_ATTEMPTS=${EMAIL_CODE_MAX_ATTEMPTS:-5}
      - EMAIL_SEND_COOLDOWN_SEC=${EMAIL_SEND_COOLDOWN_SEC:-60}
      - EMAIL_SEND_MAX_PER_HOUR=${EMAIL_SEND_MAX_PER_HOUR:-5}
      - PASSWORD_RESET_TTL_SEC=${PASSWORD_RESET_TTL_SEC:-900}
      - PASSWORD_RESET_SEND_COOLDOWN_SEC=${PASSWORD_RESET_SEND_COOLDOWN_SEC:-60}
      - REGISTRATION_INVITE_TIMEZONE=${REGISTRATION_INVITE_TIMEZONE:-Europe/Moscow}
      - REGISTRATION_INVITE_MAX_USES=${REGISTRATION_INVITE_MAX_USES:-25}
      - REGISTRATION_INVITE_MAX_EMAILS=${REGISTRATION_INVITE_MAX_EMAILS:-50}
      - TURN_SECRET=${TURN_SECRET}
      - TURN_URLS=${TURN_URLS}
      - TURN_TTL_SEC=${TURN_TTL_SEC:-600}
      # Свой STUN — тот же coturn (Binding-запросы не требуют авторизации). Пусто = дефолт
      # tree.js (гугловский). Держим Google вторым в списке: coturn лёг, а vrelay жив —
      # srflx-кандидат всё равно добывается.
      - STUN_URLS=${STUN_URLS:-}
      # Roadmap-flow-стриминга Д8: server-first (стример → сервер → зрители) — ДЕФОЛТ on.
      # Дефолт в коде (tree.js: TREE_SERVER_FIRST !== '0'); откат на legacy = выставить 0.
      # Действует только для стримов с serverIngest (нативный клиент); старые бандлы — legacy.
      - TREE_SERVER_FIRST=${TREE_SERVER_FIRST:-1}
      # Медиа-релей YouTube (совместное прослушивание, обход блокировки). Сервер лишь подписывает
      # HMAC-токен; аудио идёт браузер↔релей (deploy/media-relay), мимо этого VPS. Пусто = фича
      # выключена (resolve → 503, плеер показывает «релей недоступен»). Значения — в .env на хосте.
      - MEDIA_RELAY_URL=${MEDIA_RELAY_URL:-}
      - MEDIA_RELAY_SECRET=${MEDIA_RELAY_SECRET:-}
    volumes:
      - ./data:/app/data
    secrets:
      - smtp_password
      - auth_code_pepper
    ports:
      - "127.0.0.1:3000:3000"

  # STUN/TURN для P2P relay-дерева (Evolution-TZ Э3). host-сеть — coturn сам слушает
  # 3478 (STUN/TURN) + min-port..max-port (relay). Секрет — только через env (CLAUDE.md).
  #
  # ВЫНЕСЕН на отдельный VPS вместе с vrelay (deploy/vrelay-remote/): relay-хоп обязан стоять
  # рядом с медиаузлом, иначе зритель за симметричным NAT идёт `зритель → этот coturn → vrelay`
  # через машину, от которой мы уехали. Профиль неактивен по умолчанию, поэтому `up -d` его не
  # поднимает. Откат: COMPOSE_PROFILES=local-media в .env (+ погасить удалённый стек).
  coturn:
    image: coturn/coturn:4.12.0@sha256:161cedd63c5414c2136f306098e02e9aede74606cedad8b9b8581aae1da4e732
    profiles: ["local-media"]
    network_mode: host
    restart: unless-stopped
    logging: *logging
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf:ro
    environment:
      - TURN_SECRET=${TURN_SECRET}
      - TURN_REALM=${TURN_REALM:-relayapp.local}
      # Д8: --external-ip. Нужен ТОЛЬКО если coturn за NAT (приватный адрес на интерфейсе).
      # При host-сети и публичном IPv4 прямо на интерфейсе — оставить пустым. Пусто = флаг
      # НЕ добавляется (coturn падает на пустом значении).
      - TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}
      # Привязка к публичному интерфейсу: без неё coturn слушает и docker-мосты (172.x),
      # раздавая недостижимые relay-кандидаты. Пусто = слушать всё (прежнее поведение).
      - TURN_LISTEN_IP=${TURN_LISTEN_IP:-}
    # ${VAR:+...} подставляет флаг ТОЛЬКО если переменная непуста (иначе строки нет вовсе).
    command: ["sh", "-c", "turnserver -c /etc/turnserver.conf --static-auth-secret=$${TURN_SECRET} --realm=$${TURN_REALM} $${TURN_EXTERNAL_IP:+--external-ip=$${TURN_EXTERNAL_IP}} $${TURN_LISTEN_IP:+--listening-ip=$${TURN_LISTEN_IP} --relay-ip=$${TURN_LISTEN_IP}}"]

  # Э9: виртуальный fallback-relay — джойнится в relay-дерево, когда у зрителей нет живых
  # relay-пиров (или зритель явно выбрал «через сервер»), и passthrough-ретранслирует RTP.
  # host-сеть: WebRTC UDP напрямую с публичного IP (TURN/srflx не нужны); сигналинг — на
  # локальный token-сервис, TLS не нужен.
  #
  # ВЫНЕСЕН на отдельный VPS (deploy/vrelay-remote/): там свободно ядро под ffmpeg-транскод,
  # которого здесь не было (1 vCPU на livekit/coturn/token/caddy). Удалённый агент коннектится
  # сюда исходящим WS на wss://<домен>/tree — он WS-клиент, портов не слушает. Профиль
  # неактивен по умолчанию, поэтому `up -d` его не поднимает; блок оставлен для отката
  # (COMPOSE_PROFILES=local-media в .env). Двух агентов одновременно быть не должно:
  # findVrelayAgent() в tree.js возьмёт того, кто подключился раньше.
  vrelay:
    image: ghcr.io/devdenneg/bobicord-vrelay:${IMAGE_TAG:?IMAGE_TAG_is_required}
    profiles: ["local-media"]
    pull_policy: always
    network_mode: host
    restart: unless-stopped
    # Медиаузел: сюда пишутся строки `ingest ...` (разрывы RTP, отдача детям) — самый
    # многословный сервис и самый нужный при разборе фризов. Отдаём ему больше истории.
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "3"
    environment:
      - VRELAY_AUTH_SECRET=${VRELAY_AUTH_SECRET:?VRELAY_AUTH_SECRET_is_required}
      - TREE_WS_URL=ws://127.0.0.1:3000/tree
      # Д1: server-first делает vrelay постоянным медиаузлом. egress ≈ битрейт × дети —
      # через виртуала идёт ВЕСЬ видеотрафик. Число детей по полосе НЕ режем: браузерный
      # зритель ретранслировать не умеет, лишний стал бы сиротой без картинки. Полосу
      # держит бюджет БИТРЕЙТА (tree.js serverBudget) — смотрят все, просто хуже.
      - VRELAY_MAX_CHILDREN=${VRELAY_MAX_CHILDREN:-4}
      # Исходящая полоса узла (Мбит/с). Идёт и в скоринг best-peer, и в бюджет битрейта
      # дерева (serverBudget = out × 0.7 / детей).
      #
      # 15, не 37. Прежние 37 замерены 6 параллельными TCP-потоками — на шейпленном канале
      # они съедают burst-кредит и врут вверх. Прямой замер устойчивой ОТДАЧИ (2026-07-09,
      # 138.16.170.21, простаивающий сервер, 20 МБ на speed.cloudflare.com): 20.4 и 14.1
      # Мбит/с, при этом загрузка 68.2 Мбит/с. Завышение = ядро дропает исходящие UDP
      # (SndbufErrors), RTT зрителей уходит в секунды, фризы у ВСЕХ разом.
      - VRELAY_OUT_MBPS=${VRELAY_OUT_MBPS:-15}
      # Д2/Д4: сколько ffmpeg-транскодов одновременно. 0 = рендишны ОТКЛЮЧЕНЫ (source-only
      # passthrough); зритель получает 'rendition-unavailable', меню качества пусто.
      # Прод — 1 vCPU @2.25GHz, делит ядро с livekit/coturn/token/caddy. Транскод (декод
      # 1080p + x264-энкод) съест ядро целиком и задушит ГОЛОС. Поднимать только на VPS
      # с выделенными ядрами: ~1 ядро на один 720p30-рендишн.
      - VRELAY_MAX_TRANSCODES=${VRELAY_MAX_TRANSCODES:-0}
      - RUST_LOG=info

  caddy:
    # запечены статика фронта + Caddyfile
    image: ghcr.io/devdenneg/bobicord-web:${IMAGE_TAG:?IMAGE_TAG_is_required}
    pull_policy: always
    network_mode: host
    restart: unless-stopped
    logging: *logging
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

# Existing installations do not have mail credentials yet. /dev/null keeps the optional rollout
# bootable; before switching AUTH_EMAIL_ENFORCEMENT=required, point both source variables at the
# root-owned non-empty files documented in README.md. Only token receives these mounts.
secrets:
  smtp_password:
    file: ${SMTP_PASSWORD_SECRET_FILE:-/dev/null}
  auth_code_pepper:
    file: ${AUTH_CODE_PEPPER_SECRET_FILE:-/dev/null}
