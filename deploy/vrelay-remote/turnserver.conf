# coturn — STUN/TURN для relay-дерева RelayApp. Копия coturn/turnserver.conf для отдельного
# медиа-VPS (deploy/vrelay-remote/). Отличие ровно одно: снят `verbose` — см. в конце файла.
# Секрет (static-auth-secret) НЕ здесь — передаётся флагом из docker-compose.yml
# через env TURN_SECRET (CLAUDE.md: секреты только через env, не хардкодить).

listening-port=3478
# tls-listening-port=5349   # включить вместе с cert-file/pkey-file, когда появится сертификат для TURN

# UDP-диапазон релея. Должен совпадать с портами, открытыми на VPS (network_mode: host — открывать не нужно,
# но если coturn когда-нибудь переедет с host-сети, пробросить именно этот диапазон).
min-port=49160
max-port=49200

# external-ip НУЖЕН ТОЛЬКО ЕСЛИ coturn ЗА NAT (на интерфейсе приватный адрес, публичный
# отображается снаружи — AWS/GCP). При network_mode: host и публичном IPv4 прямо на
# интерфейсе (Hetzner/DO/Vultr) coturn видит свой адрес сам, флаг не нужен.
# Проверка на VPS: `ip -4 addr show scope global | grep inet` vs `curl -4 ifconfig.me`.
# Значение НЕ хардкодится здесь — приходит флагом --external-ip=$TURN_EXTERNAL_IP из
# docker-compose.yml. Пусто = флаг не добавляется (coturn падает на пустом значении).
# external-ip=203.0.113.10
# слушать также на IPv6 (Э3 AC: IPv6) — раскомментировать и подставить адрес VPS.
# listening-ip=2001:db8::1

# Привязка к публичному интерфейсу. Без неё coturn слушает ВСЕ интерфейсы, включая
# docker-мосты (172.17/18/19.x), и предлагает на них relay-кандидаты — зритель зря жжёт
# ICE-таймауты на заведомо недостижимых адресах. Приходит флагами из docker-compose.yml
# (env TURN_LISTEN_IP). На этом хосте задавать ОБЯЗАТЕЛЬНО: кроме публичного адреса на eth0
# висит 10.19.0.5, на eth1 — 10.114.0.2 (VPC), плюс docker0 172.17.0.1.
# listening-ip=203.0.113.10
# relay-ip=203.0.113.10

# time-limited credentials (REST API / RFC узус): username="<unix-expiry>:<userId>",
# credential=base64(HMAC-SHA1(secret, username)). Секрет — см. static-auth-secret в command: (docker-compose.yml).
# STUN Binding-запросы под эту авторизацию НЕ подпадают: use-auth-secret гейтит только
# TURN-аллокации. Поэтому тот же демон отдаёт клиентам srflx-кандидаты (см. STUN_URLS).
use-auth-secret
realm=relayapp.local

fingerprint
no-multicast-peers
no-cli

# БЕЗОПАСНОСТЬ: TURN-креды выдаются ЛЮБОМУ авторизованному юзеру (apps/server/turnCreds.js
# через iceServersFor(uid)). Без этих запретов залогиненный пользователь может использовать
# наш TURN как SSRF-пивот во внутреннюю сеть VPS: loopback и приватные диапазоны. На этом
# хосте на loopback живут посторонние сервисы, а на eth1 — приватная VPC-сеть DigitalOcean.
# Зрителям дерева приватные адреса как TURN-peer не нужны никогда — релеим только публичные.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=224.0.0.0-239.255.255.255
denied-peer-ip=240.0.0.0-255.255.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# лимит TURN (Evolution-TZ Э3 AC): ограничить egress на пользователя и суммарно.
user-quota=12
total-quota=1200
stale-nonce=600

# egress-мониторинг (Evolution-TZ Э3 AC): встроенные Prometheus-метрики coturn.
# ОБЯЗАТЕЛЬНО с prometheus-address: по умолчанию экспортер слушает ЛЮБОЙ адрес, а при
# network_mode: host это публичный IP — http://<vps>:9641/metrics отдавал бы 200 всему
# интернету (счётчики сессий и трафика + лишний неаутентифицированный HTTP-сервис).
prometheus
prometheus-address=127.0.0.1

log-file=stdout
# `verbose` СНЯТ (в отличие от coturn/turnserver.conf на проде). Этот демон объявлен клиентам
# и как STUN (STUN_URLS), а на verbose каждый Binding-запрос — строка в лог: у зрителя их
# десятки за ICE-сбор, и json-file на 100 МБ выкручивается за считанные дни.
