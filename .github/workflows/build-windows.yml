name: build-windows

on:
  push:
    branches: [main]
    paths:
      - apps/native/**
      - apps/web/**
      - apps/relay-core/**
      - .github/workflows/build-windows.yml
  workflow_dispatch:

# Версия = 0.1.<git rev-list --count HEAD>. Прод-сборки сериализованы; `queue: max` сохраняет
# до 100 ожидающих push в FIFO-очереди, поэтому промежуточный патчноут не теряется, а более
# старый installer не может позже затереть latest.json новой версии.
concurrency:
  group: relayapp-production
  queue: max

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    outputs:
      release_owner: ${{ steps.release_note.outputs.owner }}
      release_announce: ${{ steps.release_note.outputs.announce }}
      required_components: ${{ steps.release_note.outputs.required_components }}
      release_sequence: ${{ steps.ver.outputs.seq }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # полная история — иначе git rev-list --count HEAD = 1 (shallow) → версия всегда 0.1.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Validate commit patch notes
        env:
          RELEASE_FROM: ${{ github.event.before }}
          RELEASE_SHA: ${{ github.sha }}
        run: node scripts/release-notes.mjs validate --from "$env:RELEASE_FROM" --to "$env:RELEASE_SHA"

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/native/src-tauri -> target

      - name: Install web deps
        run: npm ci --prefix apps/web

      - name: Install native (tauri CLI) deps
        run: npm ci --prefix apps/native

      # Версия натива = 0.1.<кол-во коммитов> — монотонно растёт с каждым пушем в main,
      # чтобы Tauri updater видел релиз новее установленного (build-metadata semver
      # игнорирует, поэтому не +sha, а настоящий инкремент patch).
      - name: Compute version
        id: ver
        shell: bash
        run: |
          seq=$(git rev-list --count HEAD)
          echo "seq=$seq" >> "$GITHUB_OUTPUT"
          echo "v=0.1.$seq" >> "$GITHUB_OUTPUT"

      - name: Build Russian patch note payload
        id: release_note
        shell: bash
        env:
          RELEASE_FROM: ${{ github.event.before }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_REDEPLOY: ${{ github.event_name != 'push' }}
        run: |
          extra=()
          if [ "$RELEASE_REDEPLOY" = "true" ]; then extra+=(--no-announce); fi
          node scripts/release-notes.mjs generate --from "$RELEASE_FROM" --to "$RELEASE_SHA" --source desktop --version "${{ steps.ver.outputs.v }}" --attempt "${{ github.sha }}:${{ github.run_attempt }}" --output out/release-note.json "${extra[@]}"
          owner=$(jq -r '.owner' out/release-note.json)
          announce=$(jq -r '.announce' out/release-note.json)
          required_components=$(jq -c '.requiredComponents' out/release-note.json)
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "announce=$announce" >> "$GITHUB_OUTPUT"
          echo "required_components=$required_components" >> "$GITHUB_OUTPUT"
          echo "Patch-note route: owner=$owner, announce=$announce, components=$required_components"

      - name: Patch version in tauri.conf.json
        shell: bash
        run: |
          f=apps/native/src-tauri/tauri.conf.json
          tmp=$(mktemp); jq --arg v "${{ steps.ver.outputs.v }}" '.version=$v' "$f" > "$tmp" && mv "$tmp" "$f"

      # Синхронизируем Cargo.lock с манифестами до сборки. cargo fetch резолвит поверх
      # существующего lock: дописывает ТОЛЬКО новые зависимости (старые пины не трогает,
      # в отличие от generate-lockfile, который бампит всё до latest) и префетчит крейты.
      # Так Tauri не пере-локает молча в середине билда (что инвалидировало бы ключ
      # rust-cache и давало холодный билд). Раньше тут был `cargo update --locked --dry-run`
      # — жёсткий страж, но добавление новой зависимости в Cargo.toml он считал ошибкой
      # рассинхрона и падал ещё до сборки.
      - name: Sync lockfile
        working-directory: apps/native/src-tauri
        run: cargo fetch

      # Собирает фронт (beforeBuildCommand в tauri.conf.json) и упаковывает MSI+NSIS
      # (bundle.targets: "all") + updater-артефакты (createUpdaterArtifacts: true →
      # *-setup.exe + *-setup.exe.sig, подписанные minisign-ключом из секретов).
      # Code-signing-сертификата нет — SmartScreen ругнётся на "неизвестного издателя" (ок для теста).
      - name: Build Tauri app
        run: npm run build --prefix apps/native
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          # Абсолютные URL для натив-webview: location.host = tauri.localhost (bundle без
          # reverse-proxy), поэтому REST/WS дерева указываем на прод явно. Vite впекает
          # VITE_-префиксные из process.env в beforeBuildCommand-сборку веба.
          VITE_TREE_WS_URL: wss://reelay.online/tree
          VITE_API_BASE_URL: https://reelay.online
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Собираем payload для VPS: сам установщик + latest.json (Tauri v2 dynamic-манифест,
      # его читает updater-эндпоинт plugins.updater.endpoints). signature = содержимое .sig.
      - name: Assemble release payload
        shell: bash
        run: |
          set -e
          v=${{ steps.ver.outputs.v }}
          nsis=apps/native/src-tauri/target/release/bundle/nsis
          exe=$(ls "$nsis"/*-setup.exe)
          sig=$(cat "$nsis"/*-setup.exe.sig)
          mkdir -p out && cp "$exe" out/
          notes=$(jq -r 'if (.notes | length) > 0 then (.notes | map("• " + .) | join("\n")) else "Техническое обновление RelayApp" end' out/release-note.json)
          jq -n --arg version "$v" --arg notes "$notes" --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg signature "$sig" --arg url "https://reelay.online/api/app/$(basename "$exe")" \
            '{version:$version,notes:$notes,pub_date:$date,platforms:{"windows-x86_64":{signature:$signature,url:$url}}}' > out/latest.json

      # Payload (exe + latest.json) отдаём как артефакт — заливку на VPS делает
      # отдельный job `upload` на ubuntu (appleboy/scp-action — Docker-контейнер-экшен,
      # НЕ работает на windows-раннере: "Container action is only supported on Linux").
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-payload
          path: out/*
          if-no-files-found: error

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: RelayApp-windows
          path: |
            apps/native/src-tauri/target/release/bundle/msi/*.msi
            apps/native/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # Заливка на VPS в том, смонтированный в server (/app/data/releases). Отдельный
  # ubuntu-job, т.к. scp-action контейнерный (на windows не запускается). Сначала файлы
  # попадают в закрытый staging, затем latest.json атомарно промотируется последним.
  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-payload
          path: out

      - name: Copy patch note payload to VPS
        if: needs.build.outputs.release_announce == 'true'
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "out/release-note.json"
          target: /opt/voice/data
          strip_components: 1

      # Installer first lands outside the public updater directory. Only after the whole upload
      # succeeds do we snapshot active chats and atomically promote latest.json.
      - name: Upload desktop release to staging
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "out/*-setup.exe,out/latest.json"
          target: /opt/voice/data/release-staging/${{ github.sha }}
          strip_components: 1
          rm: true

      - name: Promote desktop release and complete patch note
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/voice
            stage=/opt/voice/data/release-staging/${{ github.sha }}
            releases=/opt/voice/data/releases
            test -f "$stage/latest.json"
            new_exe=$(find "$stage" -maxdepth 1 -type f -name '*-setup.exe' -printf '%f\n' | head -n 1)
            test -n "$new_exe"
            case "$new_exe" in *[!A-Za-z0-9._-]*) echo "unsafe installer name" >&2; exit 1;; esac
            test -f "$stage/$new_exe"

            candidate_seq=${{ needs.build.outputs.release_sequence }}
            case "$candidate_seq" in ''|*[!0-9]*) echo "invalid desktop release sequence" >&2; exit 1;; esac
            seq_file=/opt/voice/data/desktop-release-sequence
            current_seq=0
            if [ -f "$seq_file" ]; then
              read -r current_seq < "$seq_file" || current_seq=0
            elif [ -f "$releases/latest.json" ]; then
              current_seq=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"[0-9][0-9]*\.[0-9][0-9]*\.\([0-9][0-9]*\)".*/\1/p' "$releases/latest.json" | head -n 1)
            fi
            case "$current_seq" in ''|*[!0-9]*) current_seq=0;; esac
            if [ "$candidate_seq" -le "$current_seq" ]; then
              echo "stale desktop release ignored: $candidate_seq <= $current_seq"
              find "$stage" -maxdepth 1 -type f -delete
              rmdir "$stage"
              exit 0
            fi

            prepared=0
            if [ "${{ needs.build.outputs.release_announce }}" = "true" ]; then
              skip_marker=/opt/voice/data/release-note.${{ github.sha }}.skip
              if [ -f "$skip_marker" ]; then
                echo "Патчноут этого rollout уже помечен как bootstrap-skip"
              elif docker compose exec -T token test -f /app/publish-release.js; then
                docker compose exec -T token node publish-release.js prepare /app/data/release-note.json
                prepared=1
              else
                touch "$skip_marker"
                echo "legacy API: точный снимок аудитории до обновления недоступен; патчноут этого rollout будет пропущен"
              fi
            fi

            mkdir -p "$releases"
            mv "$stage/$new_exe" "$releases/$new_exe"
            mv "$stage/latest.json" "$releases/latest.json"
            test "$releases" = /opt/voice/data/releases
            find "$releases" -maxdepth 1 -type f -name '*-setup.exe' ! -name "$new_exe" -delete
            rmdir "$stage"

            if [ "$prepared" -eq 1 ]; then
              docker compose exec -T token node publish-release.js finalize /app/data/release-note.json
            fi
            seq_tmp="$seq_file.tmp.$$"
            printf '%s\n' "$candidate_seq" > "$seq_tmp"
            mv "$seq_tmp" "$seq_file"
