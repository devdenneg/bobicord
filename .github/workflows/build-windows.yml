name: build-windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/native/src-tauri -> target

      - name: Install web deps
        run: npm ci --prefix apps/web

      - name: Install native (tauri CLI) deps
        run: npm ci --prefix apps/native

      # Собирает фронт (beforeBuildCommand в tauri.conf.json) и упаковывает
      # MSI+NSIS (bundle.targets: "all") — не подписано (нет сертификата,
      # SmartScreen будет ругаться на "неизвестного издателя" — ок для теста).
      - name: Build Tauri app
        run: npm run build --prefix apps/native

      - uses: actions/upload-artifact@v4
        with:
          name: RelayApp-windows
          path: |
            apps/native/src-tauri/target/release/bundle/msi/*.msi
            apps/native/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
