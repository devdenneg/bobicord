name: commit-policy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # A pull request is validated as the actual head range, not GitHub's synthetic merge SHA.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Select trusted policy validator
        id: trusted_validator
        shell: bash
        env:
          TRUSTED_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          validator="$RUNNER_TEMP/release-notes.mjs"
          if [[ "$TRUSTED_SHA" =~ ^0{40}$ ]]; then
            cp scripts/release-notes.mjs "$validator"
            echo "Initial policy bootstrap: validating with the candidate validator"
          else
            [[ "$TRUSTED_SHA" =~ ^[0-9a-fA-F]{40}$ ]] || { echo "Invalid trusted policy SHA" >&2; exit 1; }
            git cat-file -e "${TRUSTED_SHA}^{commit}" 2>/dev/null \
              || { echo "Trusted policy commit is unavailable; refusing an incomplete validation" >&2; exit 1; }
            if git cat-file -e "${TRUSTED_SHA}:scripts/release-notes.mjs" 2>/dev/null; then
              git show "${TRUSTED_SHA}:scripts/release-notes.mjs" > "$validator"
            elif git cat-file -e "${TRUSTED_SHA}:AGENTS.md" 2>/dev/null; then
              echo "Policy-aware base is missing its validator; refusing to fall back to candidate code" >&2
              exit 1
            else
              cp scripts/release-notes.mjs "$validator"
              echo "One-time policy bootstrap from a base predating AGENTS.md"
            fi
          fi
          node --check "$validator"
          echo "path=$validator" >> "$GITHUB_OUTPUT"

      - name: Validate commit patch notes
        env:
          RELEASE_FROM: ${{ github.event.before || github.event.pull_request.base.sha }}
          RELEASE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          TRUSTED_VALIDATOR: ${{ steps.trusted_validator.outputs.path }}
        run: node "$TRUSTED_VALIDATOR" validate --from "$RELEASE_FROM" --to "$RELEASE_SHA"
