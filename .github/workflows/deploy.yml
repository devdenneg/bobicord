name: deploy

on:
  push:
    branches: [main]
    # Деплоим только когда менялось что-то серверное/вебовое: пересоздание контейнера
    # token рвёт все WS relay-дерева (стримы падают) — чисто нативные коммиты не должны
    # ронять прод. Нужен внеплановый деплой — workflow_dispatch.
    paths:
      - apps/server/**
      - apps/web/**
      - apps/relay/**
      - apps/relay-core/**
      - docker-compose.yml
      - coturn/**
      - .github/workflows/deploy.yml
      - .dockerignore
  workflow_dispatch:

env:
  IMAGE_SERVER: ghcr.io/devdenneg/bobicord-server
  IMAGE_WEB: ghcr.io/devdenneg/bobicord-web
  IMAGE_VRELAY: ghcr.io/devdenneg/bobicord-vrelay

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: true
          tags: |
            ${{ env.IMAGE_SERVER }}:latest
            ${{ env.IMAGE_SERVER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Э9: headless виртуальный fallback-relay. Контекст — корень репо (path-dep на
      # apps/relay-core), см. apps/relay/Dockerfile и корневой .dockerignore.
      - name: Build & push vrelay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/relay/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_VRELAY }}:latest
            ${{ env.IMAGE_VRELAY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # держим docker-compose.yml на VPS в актуальном состоянии (.env/livekit.yaml не трогаем)
      - name: Copy compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.yml
          target: /opt/voice

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u devdenneg --password-stdin
            cd /opt/voice
            docker compose pull
            docker compose up -d
            docker image prune -f
